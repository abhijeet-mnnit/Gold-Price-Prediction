<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gold Price Prediction System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-4">

    <h1 class="text-center text-warning">
        Gold Price Prediction System
    </h1>

    <p class="text-center">
        Machine Learning Dashboard
    </p>

    <div class="text-center mb-4">
        <input type="file" id="csvFile" accept=".csv">
        <button class="btn btn-warning"
        onclick="loadCSV()">
        Upload Dataset
        </button>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card dashboard-card">
                <div class="card-body">
                    <h5>Records</h5>
                    <h2 id="records">--</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card">
                <div class="card-body">
                    <h5>Slope</h5>
                    <h2 id="slope">--</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card">
                <div class="card-body">
                    <h5>Intercept</h5>
                    <h2 id="intercept">--</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card dashboard-card">
                <div class="card-body">
                    <h5>RMSE</h5>
                    <h2 id="rmse">--</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card dashboard-card mt-5">
        <div class="card-body">

            <h3>Dataset Statistics</h3>

            <table class="table table-dark mt-3">
                <thead>
                    <tr>
                        <th>Feature</th>
                        <th>Min</th>
                        <th>Max</th>
                        <th>Mean</th>
                    </tr>
                </thead>

                <tbody id="statsTable">
                </tbody>
            </table>

        </div>
    </div>

    <div class="card dashboard-card mt-5">

        <div class="card-body">

            <h3>Correlation Analysis</h3>

            <h5 id="corrOpen"></h5>
            <h5 id="corrHigh"></h5>
            <h5 id="corrLow"></h5>

        </div>

    </div>

    <div class="card dashboard-card mt-5">

        <div class="card-body">

            <h3>Predict Gold Price</h3>

            <input
            id="openInput"
            type="number"
            class="form-control"
            placeholder="Enter Opening Price">

            <button
            class="btn btn-warning mt-3"
            onclick="predictPrice()">

            Predict

            </button>

            <h2
            id="predictionResult"
            class="mt-3 text-success">

            </h2>

        </div>

    </div>

    <div class="card dashboard-card mt-5">

        <div class="card-body">

            <h3>Actual vs Predicted</h3>

            <canvas id="predictionChart"></canvas>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
